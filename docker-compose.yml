services:
  # ── quartz (production) ───────────────────────────────────────────────────────
  quartz:
    container_name: quartz
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quartz.rule=Host(`quartz.gabelopes.com`)"
      - "traefik.http.routers.quartz.entrypoints=web,websecure"
      - "traefik.http.services.quartz.loadbalancer.server.port=3000"
      - "wud.watch=true"
      - "wud.tag.include=^latest$$"
      - "wud.trigger.docker.local.auto=false"
    networks:
      - traefik

networks:
  traefik:
    external: true
